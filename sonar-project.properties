# Chaves de identificação do projeto no SonarQube/SonarCloud
sonar.projectKey=projeto-unireservas
sonar.projectName=projeto-unireservas
sonar.projectVersion=1.0.0

# Caminhos de código fonte a serem analisados (separados por vírgula)
sonar.sources=src,backend

# Codificação dos arquivos fontes
sonar.sourceEncoding=UTF-8

# Exclusões de análise (arquivos/diretórios ignorados)
sonar.exclusions=**/node_modules/**,**/dist/**,**/.venv/**,**/backend/.venv/**,**/build/**,**/uploads/**,**/public/**,**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx,**/__pycache__/**,**/.git/**,**/.dockerignore,**/.gitignore,**/Dockerfile,**/docker-compose.yml,**/nginx.conf,**/package-lock.json,**/eslint.config.js,**/postcss.config.js,**/tailwind.config.ts,**/tsconfig*.json,**/vite.config.ts

# Configurações adicionais para TypeScript/JavaScript
sonar.javascript.environments=browser,nodejs
# Caminho para relatórios de cobertura do frontend (caso implementado no futuro)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Configurações adicionais para Python
sonar.python.version=3.11
# Caminho para relatórios de cobertura do backend (caso implementado no futuro)
sonar.python.coverage.reportPaths=backend/coverage.xml
